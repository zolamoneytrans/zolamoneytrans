workflows:
  ios-workflow:
    name: iOS Build & Publish
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - appstore_credentials
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor (iOS)
        script: npx cap sync ios
      - name: Fetch and Create iOS code signing files
        script: |
          app-store-connect fetch-signing-files "com.zolamoneytrans.app" --type IOS_APP_STORE --create
          echo "Checking downloaded profiles..."
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found!"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
